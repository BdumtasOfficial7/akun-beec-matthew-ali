<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Education Quiz</title>

<!-- Screenshot -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url(bg1.png);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== CONTAINER ===== */
.container {
    width: 100%;
    max-width: 420px;
    padding: 15px;
}

/* ===== CARD ===== */
.card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn .4s ease;
}

/* ===== TITLE ===== */
.title {
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

/* ===== INPUT ===== */
.input-box {
    display:flex;
    background:#f1f1f1;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
}

.input-box span {
    margin-right:8px;
}

.input-box input {
    border:none;
    outline:none;
    background:transparent;
    flex:1;
}

/* ===== BUTTON ===== */
button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    color:white;
    background: linear-gradient(135deg,#ff7e5f,#ff3f34);
    margin-top:10px;
    cursor:pointer;
    transition:.2s;
}

button:hover {
    transform:scale(1.05);
}

/* ===== QUESTION ===== */
#question {
    font-size:18px;
    margin-bottom:10px;
}

/* ===== ANSWERS ===== */
.answer {
    background:#eee;
    padding:12px;
    border-radius:10px;
    margin:8px 0;
    cursor:pointer;
    transition:.2s;
}

.answer:hover {
    background:#ddd;
}

/* ===== PROGRESS ===== */
.progress {
    height:8px;
    background:#ddd;
    border-radius:10px;
    margin-bottom:10px;
}

.bar {
    height:8px;
    background:green;
    width:0%;
    border-radius:10px;
}

/* ===== FEEDBACK ===== */
#feedback {
    margin-top:10px;
    font-weight:bold;
}

/* ===== RESULT ===== */
.result {
    text-align:center;
}

/* ===== HIDDEN ===== */
.hidden { display:none; }

/* ===== ANIMASI ===== */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start" class="card">
    <div class="title">🎵 English Education Game</div>

    <div class="input-box">
        <span>👤</span>
        <input type="text" id="name" placeholder="Masukkan nama kamu">
    </div>

    <button onclick="startGame()">Mulai Game</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card hidden">
    <div class="progress"><div id="bar" class="bar"></div></div>

    <div id="question"></div>
    <div id="media"></div>
    <div id="answers"></div>
    <div id="feedback"></div>
</div>

<!-- RESULT -->
<div id="result" class="card hidden result">
    <h2>🎉 Hasil Akhir</h2>
    <p id="player"></p>
    <p id="score"></p>
    <p id="grade"></p>

    <button onclick="screenshot()">📸 Screenshot</button>
    <button onclick="shareWA()">📲 Kirim WA</button>
</div>

</div>

<!-- SOUND -->
<audio id="correct" src="audio/benar2.mp3"></audio>
<audio id="wrong" src="audio/salah.mp3"></audio>

<script>
let player="",current=0,score=0;

let questions=[
    // GUESS THE PICTURE
{q:"What sentence is correct for this picture?",img:"img/she-eats-an-apple.jpg",a:["She eats an apple","They play soccer","The dog bark loudly"],c:0},
{q:"What sentence is correct for this picture?",img:"img/they-play-soccer.jpg",a:["The dog bark loudly","They play soccer","She eats an apple"],c:1},
{q:"What sentence is correct for this picture?",img:"img/the-dog-bark-loudly.jpg",a:["They play soccer","She eats an apple","The dog bark loudly"],c:2},
{q:"What sentence is correct for this picture?",img:"img/we-read-books.jpg",a:["We read books","He plays piano","Father drives a car"],c:0},
{q:"What sentence is correct for this picture?",img:"img/he-plays-piano.jpg",a:["We read books","He plays piano","Father drives a car"],c:1},
{q:"What sentence is correct for this picture?",img:"img/father-drives-car.jpg",a:["We read books","He plays piano","Father drives a car"],c:2},
{q:"What sentence is correct for this picture?",img:"img/the-baby-sleeps.jpg",a:["The baby sleeps","I drink milk","Birds fly in the sky"],c:0},
{q:"What sentence is correct for this picture?",img:"img/i-drink-milk.jpg",a:["The baby sleeps","I drink milk","Birds fly in the sky"],c:1},
{q:"What sentence is correct for this picture?",img:"img/birds-fly-in-the-sky.jpg",a:["The baby sleeps","I drink milk","Birds fly in the sky"],c:2},
{q:"What sentence is correct for this picture?",img:"img/she-brushes-her-teeth.jpg",a:["She brushes her teeth","We read books","The dog bark loudly"],c:0},

// MULTIPLE CHOICE

{q:"She __ to school every day.",a:["Go","Goes","Going"],c:1},
{q:"I __ milk every morning.",a:["Drink","Drinks","Drinking"],c:0},
{q:"They __ soccer on Sunday.",a:["Plays","Play","Playing"],c:1},
{q:"My cat __ on the sofa.",a:["sleep","Sleeps","Sleeping"],c:1},
{q:"We __ English at school.",a:["Study","Studies","Studying"],c:0},
{q:"He __ his teeth at night.",a:["Brush","Brushes","Brushing"],c:1},
{q:"The bird __ in the sky.",a:["Fly","Flies","Flying"],c:1},
{q:"You __ very fast.",a:["Run","Runs","Running"],c:0},
{q:"Mother __ delicious food.",a:["Cook","Cooks","Cooking"],c:1},
{q:"The baby __ a lot.",a:["Cry","Cries","Crying"],c:1},
{q:"My brother __ TV after school.",a:["Watch","Watches","Watching"],c:1},
{q:"We __ to church every Saturday.",a:["Go","Goes","Going"],c:0},
{q:"She __ a blue bag.",a:["Have","Has","Having"],c:1},
{q:"The dog __ loudly.",a:["Bark","Barks","Barking"],c:1},
{q:"I __ my homework every evening.",a:["Do","Does","Doing"],c:0},

// TRUE OR FALSE
{q:"He plays football every day.",a:["True","False"],c:0},
{q:"She drinks water every morning.",a:["True","False"],c:0},
{q:"They goes to school by bus.",a:["True","False"],c:1},
{q:"I eat rice every day.",a:["True","False"],c:0},
{q:"My father drives a car.",a:["True","False"],c:1},
{q:"We likes ice cream.",a:["True","False"],c:1},
{q:"The cat sleeps on the chair.",a:["True","False"],c:0},
{q:"You studies English.",a:["True","False"],c:1},
{q:"Birds fly in the sky.",a:["True","False"],c:0},
{q:"She wash her hands before eating.",a:["True","False"],c:1},
{q:"My teacher teaches math.",a:["True","False"],c:0},
{q:"They play badminton every Sunday.",a:["True","False"],c:0},
{q:"He have a bicycle.",a:["True","False"],c:1},
{q:"I read books at night.",a:["True","False"],c:0},
{q:"The sun rises in the morning.",a:["True","False"],c:0},
];

function startGame(){
    player=document.getElementById("name").value;
    if(player==""){alert("Isi nama dulu!");return;}

    questions.sort(()=>Math.random()-0.5);

    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    load();
}

function load(){
    let q=questions[current];

    document.getElementById("question").innerText=q.q;
    document.getElementById("media").innerHTML="";
    document.getElementById("feedback").innerText="";

    if(q.img){
        document.getElementById("media").innerHTML=`<img src="${q.img}" width="120">`;
    }

    if(q.audio){
        document.getElementById("media").innerHTML=`<audio controls src="${q.audio}"></audio>`;
    }

    let ans=document.getElementById("answers");
    ans.innerHTML="";

    q.a.forEach((text,i)=>{
        let div=document.createElement("div");
        div.className="answer";
        div.innerText=text;
        div.onclick=()=>check(i);
        ans.appendChild(div);
    });

    updateBar();
}

function check(i){
    let q=questions[current];
    let answers=document.querySelectorAll(".answer");

    answers.forEach(a=>a.style.pointerEvents="none");

    if(i===q.c){
        score++;
        answers[i].style.background="green";
        feedback("✅ Benar!");
        document.getElementById("correct").play();
    }else{
        answers[i].style.background="red";
        answers[q.c].style.background="green";
        feedback("❌ Salah! Jawaban: "+q.a[q.c]);
        document.getElementById("wrong").play();
    }

    setTimeout(()=>{
        current++;
        if(current<questions.length){
            load();
        }else{
            result();
        }
    },1500);
}

function feedback(text){
    document.getElementById("feedback").innerText=text;
}

function updateBar(){
    let p=(current/questions.length)*100;
    document.getElementById("bar").style.width=p+"%";
}

function result(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    document.getElementById("player").innerText="Nama: "+player;
    document.getElementById("score").innerText="Skor: "+score+"/"+questions.length;

    let g="C";
    if(score>=30) g="B";
    if(score>=35) g="A";

    document.getElementById("grade").innerText="Grade: "+g;
}

function screenshot(){
    html2canvas(document.getElementById("result")).then(c=>{
        let link=document.createElement("a");
        link.download="hasil.png";
        link.href=c.toDataURL();
        link.click();
    });
}

function shareWA(){
    let text=`Saya ${player} mendapat skor ${score}/${questions.length} di Quiz Musik 🎵`;
    window.open("https://wa.me/?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
